<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
  <style>
    /* ── 전체 배경: 별 화면과 동일한 어두운 색으로 통일 ── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0a !important;
      color: #ffffff !important;
      font-family: sans-serif;
    }

    /* 모든 텍스트 흰색 강제 */
    h1, h2, h3, h4, h5, h6, p, span, li, td, th, label, div {
      color: #ffffff !important;
    }

    a { color: #4a90e2; }

    /* 기존 테마가 배경 흰색으로 덮는 거 방지 */
    section, .wrapper, .container, header, footer,
    .user-details, .user, .tech, .project-image, .project-info {
      background: transparent !important;
      background-color: transparent !important;
    }

    /* ── 4번: 3개 카드 화면 끝~끝 ── */
    .user {
      display: flex !important;
      width: 100vw !important;
      margin: 0 !important;
      padding: 0 !important;
      gap: 0 !important;
      flex-wrap: nowrap !important;
    }

    .tech {
      flex: 1 1 0 !important;
      min-width: 0 !important;
      padding: 40px 30px !important;
      border: none !important;
      border-right: 1px solid #222 !important;
      text-align: center !important;
      background: #0f0f0f !important;
    }

    .tech:last-child {
      border-right: none !important;
    }

    /* ── 3번: My Expertise + 버튼 한 박스 ── */
    .user-details {
      width: 100vw !important;
      padding: 80px 20px 40px !important;
      text-align: center !important;
      background: transparent !important;
    }

    .user-details h1 {
      font-size: 2.5rem !important;
      margin-bottom: 12px !important;
    }

    .user-details p {
      font-size: 1.1rem !important;
      opacity: 0.8;
      margin-bottom: 30px !important;
    }

    /* 버튼이 about.html에 없으면 아래 .btn 스타일만 준비 */
    .btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid white;
      color: white !important;
      padding: 12px 30px;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      display: inline-block;
    }

    /* ── 1번: 헤더/네비도 배경 투명하게 ── */
    .site-header, nav, .navbar, header {
      background: transparent !important;
      background-color: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    /* footer */
    footer {
      color: #ffffff !important;
      border-top: 1px solid #222 !important;
      padding: 30px !important;
      text-align: center !important;
    }
  </style>
</head>
