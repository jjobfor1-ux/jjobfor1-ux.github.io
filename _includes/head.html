<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
  <style>
    /* 전체 배경 어둡게 통일 */
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0a !important;
      color: #ffffff !important;
    }

    /* main.css의 color:#333, color:#555 덮어쓰기 */
    h1, h2, h3, h4, h5, h6, p, span, li, div, strong {
      color: #ffffff !important;
    }

    /* main.css의 흰 배경 방지 */
    body, section, header, footer,
    .wrapper, .container,
    .user-details, .user, .tech,
    .user-projects, .project-image, .project-info {
      background: transparent !important;
      background-color: transparent !important;
    }

    /* main.css가 #about, #projects에 max-width:960px 제한 걸어놓은 거 해제 */
    #about {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    /* 카드 3개 화면 끝~끝 */
    .user {
      display: flex !important;
      width: 100vw !important;
      margin: 0 !important;
      padding: 0 !important;
      gap: 0 !important;
      flex-wrap: nowrap !important;
      font-size: 2.8rem !important;
    }

    .tech {
      flex: 1 1 0 !important;
      min-width: 0 !important;
      padding: 40px 20px !important;
      border-right: 1px solid #222 !important;
      text-align: center !important;
      background: #0f0f0f !important;
      margin: 0 !important;
    }

    .tech:last-child {
      border-right: none !important;
    }

    .tech p {
      font-size: 0.9rem !important;
    }

    /* My Expertise 박스 */
    .user-details {
      width: 100vw !important;
      padding: 80px 20px 40px !important;
      text-align: center !important;
    }

    /* 버튼 */
    .btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid white;
      color: white !important;
      padding: 12px 30px;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      display: inline-block;
      margin-top: 10px;
    }

    /* 헤더/네비 투명 */
    .site-header, nav, .navbar, header {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    /* 프로젝트 링크 색상 */
    .project-link {
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    /* footer */
    .footer {
      background: #111 !important;
      color: #ffffff !important;
      border-top: 1px solid #222;
    }
  </style>
</head>
