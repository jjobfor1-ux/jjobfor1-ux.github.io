<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* 전체 배경 어둡게 통일 */
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0a !important;
      color: #ffffff !important;
    }

    /* main.css의 color:#333, color:#555 덮어쓰기 */
    h1, h2, h3, h4, h5, h6, p, span, li, div, strong {
      color: #ffffff !important;
    }

    /* main.css의 흰 배경 방지 */
    body, section, header, footer,
    .wrapper, .container,
    .user-details, .user, .tech,
    .user-projects, .project-image, .project-info {
      background: transparent !important;
      background-color: transparent !important;
    }

    /* main.css가 #about, #projects에 max-width:960px 제한 걸어놓은 거 해제 */
    #about {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    /* 카드 3개 화면 끝~끝 */
    .user {
      display: flex !important;
      width: 100vw !important;
      margin: 0 !important;
      padding: 0 !important;
      gap: 0 !important;
      flex-wrap: nowrap !important;
      font-size: 2.8rem !important;
      justify-content: stretch !important;  /* ← 이거 추가 */
      align-items: stretch !important;       /* ← 이거 추가 */
    }

    .tech {
      flex: 1 1 0 !important;
      min-width: 0 !important;
      padding: 40px 20px !important;
      border-right: 1px solid #222 !important;
      text-align: center !important;
      background: #0f0f0f !important;
      margin: 0 !important;
    }

    .tech:last-child {
      border-right: none !important;
    }

    .tech p {
      font-size: 0.9rem !important;
    }

    /* My Expertise 박스 */
    .user-details {
      width: 100vw !important;
      padding: 80px 20px 40px !important;
      text-align: center !important;
    }

    /* 버튼 */
    .btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid white;
      color: white !important;
      padding: 12px 30px;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      display: inline-block;
      margin-top: 10px;
    }

    /* 헤더/네비 투명 */
    .site-header, nav, .navbar, header {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    /* 프로젝트 링크 색상 */
    .project-link {
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    /* footer */
    .footer {
      background: #111 !important;
      color: #ffffff !important;
      border-top: 1px solid #222;
    }

    /* ── Project grid (layout only — reuses colors already defined above) ── */
    .project-section-title {
      font-size: 0.78rem !important;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45) !important;
      margin: 0 0 20px !important;
      padding: 40px 0 16px !important;
      border-top: 1px solid #1e1e1e;
    }
    .project-section-title:first-child {
      border-top: none;
      padding-top: 0 !important;
    }
    .project-category-title {
      font-size: 0.72rem !important;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55) !important;
      margin: 32px 0 14px !important;
      padding: 0 !important;
    }
    .project-category-title:first-of-type {
      margin-top: 0 !important;
    }
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 26px;
      margin: 0 0 10px !important;
    }
    .project-grid--sub {
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      opacity: 0.88;
    }
    .project-card {
      display: flex !important;
      flex-direction: column !important;
      background: #0f0f0f !important;
      border: 1px solid #222 !important;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.25s ease;
      margin: 0 !important;
      width: auto !important;
    }
    .project-card:hover {
      border-color: rgba(255, 255, 255, 0.3) !important;
    }
    .project-card-media {
      display: block;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: #111 !important;
      border-bottom: 1px solid #1e1e1e;
    }
    .project-card-media img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      border-radius: 0 !important;
      float: none !important;
      display: block;
    }
    .project-card-body {
      padding: 16px 18px 18px !important;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .project-card-body h3 {
      font-size: 1rem !important;
      font-weight: 600;
      margin: 0 0 8px !important;
      padding: 0 !important;
      line-height: 1.3;
    }
    .project-card-body p {
      font-size: 0.82rem !important;
      line-height: 1.5;
      margin: 0 0 12px !important;
      opacity: 0.72;
      flex: 1;
    }
    .project-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .project-card-tags span {
      font-size: 0.68rem !important;
      padding: 3px 9px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      opacity: 0.8;
      white-space: nowrap;
    }
    .project-card-tags span:first-child {
      border-color: rgba(255, 255, 255, 0.45);
      opacity: 1;
    }
    .project-card-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .project-card-links a {
      font-size: 0.75rem !important;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, 0.35) !important;
      border-radius: 20px;
      color: #ffffff !important;
      text-decoration: none !important;
      transition: background 0.2s ease;
      margin: 0 !important;
    }
    .project-card-links a:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
